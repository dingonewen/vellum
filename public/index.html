<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vellum — Mailbox Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: #FDF8F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px;
      color: #2C1810;
    }
    .card {
      background: #FFFDF7;
      border: 1px solid #E8DCC8;
      border-radius: 4px;
      box-shadow: inset 0 1px 3px rgba(44,24,16,0.04), 0 4px 16px rgba(44,24,16,0.08);
      padding: 40px 44px;
      width: 100%;
      max-width: 500px;
    }
    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 30px;
      font-weight: 700;
      color: #7C4F2A;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .tagline {
      color: #8B7355;
      font-size: 15px;
      font-style: italic;
      margin-bottom: 36px;
    }
    h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #2C1810;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 20px;
      border-radius: 2px;
      border: none;
      cursor: pointer;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary {
      background: #F5EFE4;
      color: #7C4F2A;
      border: 1px solid #E8DCC8;
    }
    .mailbox-list { margin-bottom: 16px; }
    .mailbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #F5EFE4;
      border: 1px solid #E8DCC8;
      border-radius: 2px;
      margin-bottom: 8px;
      font-size: 15px;
      color: #5C3D1E;
    }
    .grant-id {
      font-size: 11px;
      color: #B8A08A;
      word-break: break-all;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Vellum</div>
    <div class="tagline">Connect mailboxes for the Sandbox &amp; Agent</div>

    <h2>Connected Mailboxes</h2>
    <div id="mailbox-list" class="mailbox-list" style="display:none;"></div>
    <p style="color:#8B7355;font-size:14px;margin-bottom:8px;">Grant IDs are needed for <code>.env</code> sandbox configuration.</p>
    <a href="/auth/connect" class="btn btn-primary" id="connect-btn">
      ✉ Connect a mailbox
    </a>
  </div>

  <script>
    async function loadGrants() {
      try {
        const res = await fetch('/auth/grants');
        const data = await res.json();
        const list = document.getElementById('mailbox-list');
        if (data.grants && data.grants.length > 0) {
          list.style.display = 'block';
          list.innerHTML = data.grants
            .map(g => `<div class="mailbox-item">✓ ${g.email}<div class="grant-id">Grant: ${g.grantId}</div></div>`)
            .join('');
          document.getElementById('connect-btn').textContent = '✉ Connect another mailbox';
        }
      } catch {}
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('connected') === 'true') {
      window.history.replaceState({}, '', '/');
    }

    loadGrants();
  </script>
</body>
</html>
