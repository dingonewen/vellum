<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>emailorning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
      color: #1a1a1a;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 36px 40px;
      width: 100%;
      max-width: 480px;
    }
    .logo { font-size: 28px; font-weight: 800; color: #6366f1; margin-bottom: 4px; }
    .tagline { color: #666; font-size: 14px; margin-bottom: 32px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #333; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 11px 20px;
      border-radius: 8px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 600; text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-secondary { background: #f3f4f6; color: #333; }
    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 28px 0; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #444; }
    input, select {
      width: 100%; padding: 9px 12px;
      border: 1px solid #d1d5db; border-radius: 7px;
      font-size: 14px; color: #1a1a1a; background: #fff;
      margin-bottom: 16px; outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #6366f1; }
    .mailbox-list { margin-bottom: 16px; }
    .mailbox-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 7px; margin-bottom: 8px; font-size: 13px; color: #166534;
    }
    .alert {
      padding: 12px 14px; border-radius: 8px;
      font-size: 13px; margin-top: 12px; display: none;
    }
    .alert-success { background: #dcfce7; color: #166534; }
    .alert-error { background: #fee2e2; color: #991b1b; }
    .step { color: #9ca3af; font-size: 13px; margin-bottom: 8px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📧 emailorning</div>
    <div class="tagline">AI-powered inbox digest, delivered on your schedule.</div>

    <!-- Step 1: Connect -->
    <div class="step">STEP 1</div>
    <h2>Connect your mailboxes</h2>
    <div id="mailbox-list" class="mailbox-list" style="display:none;"></div>
    <a href="/auth/connect" class="btn btn-secondary" id="connect-btn">
      🔗 Connect a mailbox
    </a>

    <hr class="divider" />

    <!-- Step 2: Configure -->
    <div class="step">STEP 2</div>
    <h2>Configure your digest</h2>
    <form id="config-form">
      <label for="destEmail">Send digest to</label>
      <input type="email" id="destEmail" name="destEmail" placeholder="you@anywhere.com" required />

      <label for="cadence">How often?</label>
      <select id="cadence" name="cadence">
        <option value="* * * * *">Every minute (testing)</option>
        <option value="0 * * * *">Hourly</option>
        <option value="0 8 * * *" selected>Daily at 8am UTC</option>
        <option value="0 8 * * 1">Weekly on Monday at 8am UTC</option>
      </select>

      <label for="anthropicApiKey">Anthropic API key <span style="color:#9ca3af;font-weight:400">(optional — use your own quota)</span></label>
      <input type="password" id="anthropicApiKey" name="anthropicApiKey" placeholder="sk-ant-..." autocomplete="off" required />

      <button type="submit" class="btn btn-primary">💾 Save &amp; Schedule</button>
    </form>
    <div id="alert" class="alert"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    // Load connected mailboxes from server
    async function loadGrants() {
      try {
        const res = await fetch('/auth/grants');
        const data = await res.json();
        const list = document.getElementById('mailbox-list');
        if (data.grants && data.grants.length > 0) {
          list.style.display = 'block';
          list.innerHTML = data.grants
            .map(g => `<div class="mailbox-item">✅ ${g.email}</div>`)
            .join('');
          document.getElementById('connect-btn').textContent = '🔗 Connect another mailbox';
          // Pre-fill destEmail with first mailbox if empty
          const destInput = document.getElementById('destEmail');
          if (!destInput.value) destInput.value = data.grants[0].email;
        }
      } catch {}
    }

    if (params.get('connected') === 'true') {
      window.history.replaceState({}, '', '/');
    }

    loadGrants();

    document.getElementById('config-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      alert.style.display = 'none';

      const body = {
        destEmail: document.getElementById('destEmail').value,
        cronExpr: document.getElementById('cadence').value,
        anthropicApiKey: document.getElementById('anthropicApiKey').value.trim(),
      };

      try {
        const res = await fetch('/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (res.ok) {
          const mailboxes = data.mailboxes?.join(', ') ?? '';
          alert.className = 'alert alert-success';
          const keyNote = data.usingOwnApiKey ? ' (using your API key)' : '';
          alert.textContent = `✅ Schedule saved! Digesting ${mailboxes}. Next digest at ${new Date(data.nextFireAt).toLocaleString()}${keyNote}.`;
        } else {
          alert.className = 'alert alert-error';
          alert.textContent = `❌ ${data.error || JSON.stringify(data.errors)}`;
        }
      } catch {
        alert.className = 'alert alert-error';
        alert.textContent = '❌ Network error — is the server running?';
      }
      alert.style.display = 'block';
    });
  </script>
</body>
</html>
