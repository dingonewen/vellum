<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vellum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: #FDF8F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px;
      color: #2C1810;
    }

    .card {
      background: #FFFDF7;
      border: 1px solid #E8DCC8;
      border-radius: 4px;
      box-shadow:
        inset 0 1px 3px rgba(44,24,16,0.04),
        0 4px 16px rgba(44,24,16,0.08);
      padding: 40px 44px;
      width: 100%;
      max-width: 500px;
    }

    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 30px;
      font-weight: 700;
      color: #7C4F2A;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .tagline {
      color: #8B7355;
      font-size: 15px;
      font-style: italic;
      margin-bottom: 36px;
    }

    h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #2C1810;
      letter-spacing: 0.01em;
    }

    .step {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #C4A35A;
      margin-bottom: 8px;
    }

    .divider {
      text-align: center;
      color: #C4A35A;
      font-size: 22px;
      margin: 32px 0;
      position: relative;
      line-height: 1;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: #E8DCC8;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 5px;
      color: #5C3D1E;
      letter-spacing: 0.01em;
    }

    label span { color: #8B7355; font-weight: 400; }

    input, select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #E8DCC8;
      border-radius: 2px;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 15px;
      color: #2C1810;
      background: #FFFDF7;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus {
      border-color: #C4A35A;
      box-shadow: 0 0 0 2px rgba(196,163,90,0.12);
    }
    input::placeholder { color: #B8A08A; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 20px;
      border-radius: 2px;
      border: none;
      cursor: pointer;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary {
      background: #7C4F2A;
      color: #FDF8F0;
    }
    .btn-secondary {
      background: #F5EFE4;
      color: #7C4F2A;
      border: 1px solid #E8DCC8;
    }

    .mailbox-list { margin-bottom: 16px; }
    .mailbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #F5EFE4;
      border: 1px solid #E8DCC8;
      border-radius: 2px;
      margin-bottom: 8px;
      font-size: 15px;
      color: #5C3D1E;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 2px;
      font-size: 15px;
      margin-top: 12px;
      display: none;
      font-style: italic;
      border-left: 3px solid;
    }
    .alert-success {
      background: #F5EFE4;
      color: #5C3D1E;
      border-color: #C4A35A;
    }
    .alert-error {
      background: #FDF0EE;
      color: #7A2A20;
      border-color: #C47A6A;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Vellum</div>
    <div class="tagline">Your correspondence, distilled each morning.</div>

    <div class="step">Step I</div>
    <h2>Connect your mailboxes</h2>
    <div id="mailbox-list" class="mailbox-list" style="display:none;"></div>
    <a href="/auth/connect" class="btn btn-secondary" id="connect-btn">
      ✉ Connect a mailbox
    </a>

    <div class="divider">❧</div>

    <div class="step">Step II</div>
    <h2>Configure your digest</h2>
    <form id="config-form">
      <label for="destEmail">Deliver digest to</label>
      <input type="email" id="destEmail" name="destEmail" placeholder="you@example.com" required />

      <label for="cadence">Frequency</label>
      <select id="cadence" name="cadence">
        <option value="* * * * *">Every minute (for testing)</option>
        <option value="0 * * * *">Hourly</option>
        <option value="0 8 * * *" selected>Daily at 8 am UTC</option>
        <option value="0 8 * * 1">Weekly — Monday at 8 am UTC</option>
      </select>

      <label for="llmProvider">AI provider</label>
      <select id="llmProvider" name="llmProvider" required>
        <option value="anthropic">Anthropic — Claude Haiku</option>
        <option value="gemini">Google — Gemini 2.0 Flash</option>
        <option value="openai">OpenAI — GPT-4o mini</option>
      </select>

      <label for="llmApiKey">API key</label>
      <input type="password" id="llmApiKey" name="llmApiKey" placeholder="sk-ant-..." autocomplete="off" required />

      <button type="submit" class="btn btn-primary">Save &amp; Schedule</button>
    </form>
    <div id="alert" class="alert"></div>
  </div>

  <script>
    const placeholders = { anthropic: 'sk-ant-...', gemini: 'AIza...', openai: 'sk-...' };

    async function loadGrants() {
      try {
        const res = await fetch('/auth/grants');
        const data = await res.json();
        const list = document.getElementById('mailbox-list');
        if (data.grants && data.grants.length > 0) {
          list.style.display = 'block';
          list.innerHTML = data.grants
            .map(g => `<div class="mailbox-item">✓ ${g.email}</div>`)
            .join('');
          document.getElementById('connect-btn').textContent = '✉ Connect another mailbox';
          const destInput = document.getElementById('destEmail');
          if (!destInput.value) destInput.value = data.grants[0].email;
        }
      } catch {}
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('connected') === 'true') {
      window.history.replaceState({}, '', '/');
    }

    loadGrants();

    document.getElementById('llmProvider').addEventListener('change', (e) => {
      document.getElementById('llmApiKey').placeholder = placeholders[e.target.value] ?? '';
    });

    document.getElementById('config-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      alertEl.style.display = 'none';

      const body = {
        destEmail: document.getElementById('destEmail').value,
        cronExpr: document.getElementById('cadence').value,
        llmProvider: document.getElementById('llmProvider').value,
        llmApiKey: document.getElementById('llmApiKey').value.trim(),
      };

      try {
        const res = await fetch('/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (res.ok) {
          const mailboxes = data.mailboxes?.join(', ') ?? '';
          alertEl.className = 'alert alert-success';
          alertEl.textContent = `Vellum is ready. Watching ${mailboxes} via ${data.llmProvider}. Your first dispatch arrives at ${new Date(data.nextFireAt).toLocaleString()}.`;
        } else {
          alertEl.className = 'alert alert-error';
          alertEl.textContent = data.error || JSON.stringify(data.errors);
        }
      } catch {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = 'Could not reach the server. Is it running?';
      }
      alertEl.style.display = 'block';
    });
  </script>
</body>
</html>
